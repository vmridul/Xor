<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XOR — Tweet Saver</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      min-height: 200px;
      background: #0a0a0f;
      color: #e7e9ea;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .popup-header {
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, #1d9bf0 0%, #1a8cd8 100%);
      position: relative;
      overflow: hidden;
    }

    .popup-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.15) 0%, transparent 60%);
    }

    .popup-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .popup-logo-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: white;
      backdrop-filter: blur(8px);
    }

    .popup-logo-text {
      font-size: 22px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }

    .popup-logo-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      font-weight: 400;
      margin-top: 2px;
    }

    /* ─── Stats Grid ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px 20px;
    }

    .stat-card {
      background: #16181c;
      border: 1px solid #2f3336;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      transition: all 200ms ease;
    }

    .stat-card:hover {
      border-color: #1d9bf0;
      background: rgba(29, 155, 240, 0.06);
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #1d9bf0, #1a8cd8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .stat-label {
      font-size: 11px;
      color: #71767b;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ─── Recent Folders ─── */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #71767b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 12px 20px 8px;
    }

    .recent-folders {
      padding: 0 12px 8px;
    }

    .folder-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: default;
      transition: background 150ms ease;
    }

    .folder-row:hover {
      background: #1d1f23;
    }

    .folder-row-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .folder-row-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .folder-row-name {
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #e7e9ea;
    }

    .folder-row-count {
      font-size: 12px;
      color: #71767b;
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 16px 20px;
      color: #71767b;
      font-size: 13px;
    }

    /* ─── Dashboard Button ─── */
    .popup-actions {
      padding: 8px 16px 16px;
    }

    .dashboard-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 200ms ease;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .dashboard-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.45);
    }

    .dashboard-btn:active {
      transform: translateY(0);
    }

    .dashboard-btn svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    /* ─── Footer ─── */
    .popup-footer {
      text-align: center;
      padding: 8px 16px 14px;
      font-size: 11px;
      color: #3e4247;
    }

    .popup-footer kbd {
      background: #1d1f23;
      border: 1px solid #2f3336;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
      color: #71767b;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo">
      <div class="popup-logo-icon">X</div>
      <div>
        <div class="popup-logo-text">XOR</div>
        <div class="popup-logo-sub">Tweet Saver</div>
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="totalTweets">0</div>
      <div class="stat-label">Saved Tweets</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalFolders">0</div>
      <div class="stat-label">Folders</div>
    </div>
  </div>

  <div class="section-title">Recent Folders</div>
  <div class="recent-folders" id="recentFolders">
    <div class="empty-state">No folders yet</div>
  </div>

  <div class="popup-actions">
    <button class="dashboard-btn" id="openDashboard">
      <svg viewBox="0 0 24 24"><path d="M4 13h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1zm-1 7a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v4zm10 0a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1v8zm1-17v4a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 0z"/></svg>
      Open Dashboard
    </button>
  </div>

  <div class="popup-footer">
    Tip: Press <kbd>Alt</kbd> + <kbd>S</kbd> to quickly save tweets
  </div>

  <script src="../shared/utils.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="index.js"></script>
</body>
</html>
